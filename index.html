<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <h1 class="heading">Shop</h1>
      <p>Welcome</p>
      <ul>
        <li>Apple</li>
        <li>Banana</li>
      </ul>
    </div>
    <button id="event-button">click here</button>
    <br /><br />

    <input id="live-input" type="text" placeholder="Type something..." />
    <p id="preview">This paragraph will cahnge once u write something</p>
        <hr />
    <div>
      <input type="text" id="listinput" placeholder="add items to the list" />
      <ul id="list"></ul>
      <button id="addButton">Add</button>
    </div>
    <br /><br />

    <div id="cards-container">
      <div class="color-card">Card 1</div>
      <div class="color-card">Card 2</div>
      <div class="color-card">Card 3</div>
    </div>

    <br />
    <br />
    <br />

    <button id="toggle-btn">Toggle Section</button>
    <div id="toggle-section">
      This section will be hidden once u click the button
    </div>

    <br /><br /><br />

    <div id="counter-app">
      <button id="decrease-btn">-</button>
      <span id="counter-value">0</span>
      <button id="increase-btn">+</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
